  - type: Features
    data:
      - name: United States Operations
        description: >-
          Exploration and production activities in the Permian Basin and other
          US basins through the Apache Corporation subsidiary.
      - name: Egypt Operations
        description: >-
          Long-standing operations in Egypt's Western Desert through Apache
          Corporation, one of the largest private natural gas producers in Egypt.
      - name: United Kingdom Operations
        description: >-
          North Sea oil and gas operations through Apache Corporation's UK
          subsidiary.
      - name: Suriname Exploration
        description: >-
          Offshore exploration in Suriname Block 58 through the APA Suriname
          subsidiary, with significant oil discoveries including the GranMorgu
          project.
      - name: Alaska Exploration
        description: >-
          Exploration activities on Alaska's North Slope including the Sockeye-2
          well oil discovery in partnership with Lagniappe Alaska and Santos.
  - type: UseCases
    data:
      - name: Investor Relations
        description: >-
          Access financial results, stock information, SEC filings, and
          corporate governance information for APA Corporation shareholders.
      - name: Energy Production Data
        description: >-
          Track oil, natural gas, and natural gas liquids production data
          across APA's operational regions.
  - type: Integrations
    data:
      - name: Nasdaq
        description: >-
          APA Corporation is listed on Nasdaq (ticker: APA) and Nasdaq Texas,
          enabling trading and investor relations integrations.
