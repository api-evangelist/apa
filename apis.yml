aid: apa
name: APA Corporation
description: >-
  APA Corporation is an independent energy company that explores for, develops,
  and produces natural gas, crude oil, and natural gas liquids, with operations
  in the United States, Egypt, the United Kingdom, and Suriname. Organized in
  Delaware and headquartered in Houston, Texas, APA is listed on Nasdaq (APA)
  and listed on Nasdaq Texas since March 2026.
